# Mavisual — Windows EXE Build Workflow

> Complete step-by-step guide to compile Mavisual as a portable `.exe` for offline classroom use.

---

## Overview

Mavisual is built with **Vite + React + TypeScript** and packaged as a desktop app using **Electron**. The final output is a portable Windows `.exe` file that runs with no internet connection, no installer needed.

**Stack:**
- Frontend: React 19 + Tailwind CSS v4 + Lucide Icons
- Runtime: Electron 42
- Bundler: Vite 6
- Packager: electron-builder

---

## Prerequisites

Install the following on your Windows machine before building:

| Tool | Version | Download |
|------|---------|----------|
| Node.js | 20 LTS or higher | https://nodejs.org |
| npm | bundled with Node | — |
| Git (optional) | any | https://git-scm.com |

> **Note:** You do not need Python, .NET, or any other runtime.

---

## Step 1 — Install Dependencies

Open a terminal (PowerShell or CMD) inside the `mavisual/` folder:

```bash
npm install
```

This installs all packages listed in `package.json`, including Electron and electron-builder.

If Electron download times out or is blocked, the project is already configured to use the Chinese mirror:

```bash
# Already set in scripts — runs automatically
ELECTRON_MIRROR="https://cdn.npmmirror.com/binaries/electron/"
```

---

## Step 2 — Test in Development Mode

Before building the final EXE, verify the app runs correctly:

```bash
npm run electron:dev
```

This will:
1. Build the Vite frontend into `dist/`
2. Launch Electron pointing at the built `dist/index.html`
3. Open DevTools automatically for inspection

> If you see a white screen, check the browser console for errors and ensure `dist/index.html` was built correctly.

---

## Step 3 — Build the Production EXE

Run the full build command:

```bash
npm run electron:build
```

Internally this executes:
```
vite build → esbuild (server.ts) → electron-builder --win --portable
```

**What each step does:**

| Step | Command | Output |
|------|---------|--------|
| 1. Frontend build | `vite build` | `dist/` folder with all HTML/JS/CSS assets |
| 2. Server bundle | `esbuild server.ts` | `dist/server.cjs` (not used in offline mode) |
| 3. EXE packaging | `electron-builder` | `dist-electron/` containing the portable EXE |

---

## Step 4 — Locate Your EXE

After the build completes, find your file at:

```
mavisual/
└── dist-electron/
    └── mavisual 0.1.0.exe    ← Your portable app
```

The file is a **single portable EXE** — no installation required. Copy it to any Windows machine and double-click to run.

---

## Step 5 — Test the EXE

1. Double-click `mavisual 0.1.0.exe`
2. The Mavisual window should open at 1280×800
3. Confirm:
   - The dashboard loads with all 6 strand cards
   - A visualizer opens when clicked (e.g. Fraction Wall)
   - The Workspace/Whiteboard tab loads
   - The Offline indicator shows green
   - No internet connection is required at any point

