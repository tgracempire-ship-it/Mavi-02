## Troubleshooting

**"Cannot find Electron" error during build:**
```bash
npm run electron:repair
```

**Build fails with "ENOENT dist/index.html":**
Run `npm run build` first, then run electron-builder manually:
```bash
npm run build
npx electron-builder --win --portable
```

**App opens but shows blank white page:**
- Check `electron-main.cjs` — the `win.loadFile()` path must point to `dist/index.html`
- Run `npm run electron:dev` to check for console errors

**Fonts look different in the EXE:**
The app uses Google Fonts (Sora, DM Sans, DM Mono). In true offline environments, download and embed them:
```css
/* Replace the @import in src/index.css with local @font-face declarations */
@font-face {
  font-family: 'Sora';
  src: url('./fonts/Sora-Bold.woff2') format('woff2');
}
```

