## Quick Reference Commands

```bash
npm install              # Install all dependencies
npm run electron:dev     # Test app in Electron (development)
npm run electron:build   # Build portable EXE → dist-electron/
npm run electron:repair  # Re-install Electron if broken
npm run build            # Build frontend only (no Electron)
npm run dev              # Run as web app only (browser)
```

