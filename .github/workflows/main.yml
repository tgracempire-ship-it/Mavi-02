## Build Configuration Reference

The build is controlled by the `"build"` section of `package.json`:

```json
{
  "build": {
    "appId": "com.mavisual.app",
    "productName": "mavisual",
    "directories": {
      "output": "dist-electron"
    },
    "files": [
      "dist/**/*",
      "electron-main.cjs",
      "electron-preload.js"
    ],
    "win": {
      "target": "portable"
    }
  }
}
```

**To customise:**

| Setting | Change to |
|---------|-----------|
| App name | `"productName": "Mavisual Teaching Aid"` |
| Output folder | `"output": "release"` |
| Create installer instead | `"target": "nsis"` |
| Add an app icon | Add `"icon": "src/assets/images/mavisual_logo.png"` (must be `.png`, 256×256 minimum) |

---

## Adding an App Icon

To show your logo instead of the default Electron icon:

1. Convert `mavisual_logo.jpg` to `mavisual_logo.ico` using an online tool (e.g. https://convertio.co)
2. Place it in `src/assets/images/mavisual_logo.ico`
3. Update `package.json`:
   ```json
   "win": {
     "target": "portable",
     "icon": "src/assets/images/mavisual_logo.ico"
   }
   ```
4. Rebuild with `npm run electron:build`

