## Offline Architecture Notes

Mavisual is fully offline by design. Here is how each system works without internet:

| Feature | How it works offline |
|---------|---------------------|
| Concept explanations | Served from `src/offlineBrain.ts` — a bundled knowledge base of all visualiser explanations |
| Practice questions | Served from `src/offlineBrain.ts` — pre-written MCQ banks for each lab |
| Visualisers | Pure React components — no API calls |
| Whiteboard | Canvas-based drawing — fully local |
| 3D solids | Three.js — bundled, no CDN |
| Graph plotter | Custom canvas renderer — no library needed |
| Fonts | Loaded from Google Fonts on first run; cached by the OS/browser engine. To make 100% offline, download fonts and self-host in `src/assets/` |

